name: Release Build

# 트리거: v0.1.2, v1.0.0 같은 형식의 태그가 push 될 때 실행
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ────────────────────────────────────────────────
  # Job 1 & 2: macOS / Windows 빌드 (병렬 실행)
  # ────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false  # 한쪽 OS가 실패해도 다른 OS는 계속 진행
      matrix:
        include:
          - os: macos-latest
            os_short: mac
          - os: windows-latest
            os_short: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 태그명(vX.Y.Z) 에서 버전 추출 → pinstock/__version__.py 덮어쓰기
      # 리포에 커밋된 값은 "0.0.0+dev" placeholder. 릴리즈 빌드에서만 진짜 버전이 박힌다.
      - name: Inject version from tag
        shell: python
        run: |
          import os, pathlib
          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          path = pathlib.Path("pinstock") / "__version__.py"
          path.write_text(f'__version__ = "{version}"\n', encoding="utf-8")
          print(f"Injected __version__ = {version} (from tag {tag})")

      # macOS — .app 번들을 ditto 로 압축 (실행 권한/심볼릭링크 보존)
      # 산출물: Pinstock-mac-v0.1.3.zip 형태 (태그명이 자동 삽입됨)
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller pinstock.spec --noconfirm
          ditto -c -k --keepParent dist/Pinstock.app Pinstock-mac-${{ github.ref_name }}.zip

      # Windows — dist/Pinstock/ 폴더 통째로 zip
      # 산출물: Pinstock-win-v0.1.3.zip 형태
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller pinstock.spec --noconfirm
          Compress-Archive -Path dist/Pinstock/* -DestinationPath Pinstock-win-${{ github.ref_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pinstock-${{ matrix.os_short }}-${{ github.ref_name }}
          path: Pinstock-${{ matrix.os_short }}-${{ github.ref_name }}.zip
          retention-days: 7

  # ────────────────────────────────────────────────
  # Job 3: GitHub Release 생성 + 파일 첨부
  # ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build  # 위 build 두 개가 모두 끝나야 실행
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Release 생성 권한

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true  # 릴리즈 노트 자동 생성 (방식 A)
          draft: false
          prerelease: false
